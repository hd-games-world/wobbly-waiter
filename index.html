<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Wobbly Waiter v0.3.0</title>
    <link rel="stylesheet" href="style.css">
    <!-- PyScript Assets -->
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
</head>
<body>
    <canvas id="game-canvas"></canvas>

    <div id="start-screen">
        <div class="phone-icon"></div>
        <h1>Wobbly Waiter</h1>
        <div class="loading-container">
            <div class="loading-bar">
                <div class="loading-progress" id="loading-progress"></div>
            </div>
            <div class="loading-text" id="loading-text">Initializing v0.3.0...</div>
        </div>
        <div class="difficulty-select">
            <button class="difficulty-btn" data-difficulty="easy">Easy</button>
            <button class="difficulty-btn selected" data-difficulty="medium">Medium</button>
            <button class="difficulty-btn" data-difficulty="hard">Hard</button>
        </div>
        <button id="start-btn" class="btn" disabled>Wait for Logic...</button>
    </div>

    <div id="game-over">
        <h2>Game Over!</h2>
        <p id="score">Score: 0</p>
        <button id="restart-btn" class="btn">Try Again</button>
    </div>

    <div id="calibration-screen">
        <h2>Hold steady...</h2>
        <p>Calibrating sensors</p>
    </div>

    <!-- The Data Bridge -->
    <script>
        window.gameState = {
            tilt: 0,
            score: 0,
            isGameOver: false,
            difficulty: 'medium',
            gameStarted: false
        };

        // Responsive Canvas: JS Observer for --vw and --vh
        const updateViewportVars = () => {
            const vw = window.innerWidth * 0.01;
            const vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vw', `${vw}px`);
            document.documentElement.style.setProperty('--vh', `${vh}px`);
            
            // Ensure canvas matches screen
            const canvas = document.getElementById('game-canvas');
            if (canvas) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
        };

        window.addEventListener('resize', updateViewportVars);
        updateViewportVars();

        // Sensor Integration: Generic Sensor API
        async function initSensors() {
            if ('RelativeOrientationSensor' in window) {
                try {
                    const permissions = await Promise.all([
                        navigator.permissions.query({ name: "accelerometer" }),
                        navigator.permissions.query({ name: "gyroscope" })
                    ]);

                    if (permissions.every(p => p.state === "granted")) {
                        startSensor();
                    } else {
                        console.log("Sensor permissions not granted yet");
                        // Fallback to deviceorientation if needed, but sticking to request
                    }
                } catch (error) {
                    console.log("Generic Sensor API error:", error);
                }
            } else {
                console.log("Generic Sensor API not supported, using DeviceOrientation fallback");
                window.addEventListener('deviceorientation', (event) => {
                    if (!window.gameState.gameStarted) return;
                    // Simple tilt mapping
                    const tilt = event.beta || 0; 
                    window.gameState.tilt = tilt;
                });
            }
        }

        function startSensor() {
            const sensor = new RelativeOrientationSensor({ frequency: 60 });
            sensor.addEventListener('reading', () => {
                // Map quaternion to simple tilt (Z-axis rotation roughly)
                // For foundation v0.3.0, we just need a value in window.gameState.tilt
                // A basic mapping of the quaternion's y/z components for tilt:
                const q = sensor.quaternion;
                const siny_cosp = 2 * (q[3] * q[1] + q[0] * q[2]);
                const cosy_cosp = 1 - 2 * (q[1] * q[1] + q[2] * q[2]);
                const angle = Math.atan2(siny_cosp, cosy_cosp);
                window.gameState.tilt = angle * (180 / Math.PI);
            });
            sensor.start();
        }

        // UI Logic
        document.querySelectorAll('.difficulty-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.difficulty-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                window.gameState.difficulty = btn.dataset.difficulty;
            });
        });

        document.getElementById('start-btn').addEventListener('click', async () => {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('calibration-screen').style.display = 'flex';
            
            await initSensors();

            setTimeout(() => {
                document.getElementById('calibration-screen').style.display = 'none';
                window.gameState.gameStarted = true;
            }, 1500);
        });

        document.getElementById('restart-btn').addEventListener('click', () => {
            document.getElementById('game-over').style.display = 'none';
            window.gameState.isGameOver = false;
            window.gameState.score = 0;
            if (window.pyGameReset) window.pyGameReset();
        });

        // Mouse Fallback for testing
        document.addEventListener('mousemove', (e) => {
            if (window.gameState.gameStarted) {
                const centerX = window.innerWidth / 2;
                const offset = e.clientX - centerX;
                window.gameState.tilt = (offset / centerX) * 45;
            }
        });

        // Assets callback from Python
        window.onAssetsLoaded = () => {
            const startBtn = document.getElementById('start-btn');
            startBtn.disabled = false;
            startBtn.classList.add('ready');
            startBtn.textContent = "Start Game";
            document.getElementById('loading-progress').style.width = '100%';
            document.getElementById('loading-text').textContent = "Foundation Ready";
        };
    </script>

    <!-- Logic: main.py -->
    <script type="py" src="main.py" config='{"interpreter_terminate_on_error": false}'></script>
</body>
</html>
